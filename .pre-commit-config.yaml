default_language_version:
    python: python3
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
        args:
        -   --unsafe
    -   id: check-added-large-files
    -   id: check-xml
    -   id: check-toml
    -   id: check-json
    -   id: check-merge-conflict
    -   id: detect-aws-credentials
        args: [--allow-missing-credentials]
-   repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.8.0
    hooks:
    -   id: shellcheck
-   repo: https://github.com/asottile/pyupgrade
    rev: v3.7.0
    hooks:
    -   id: pyupgrade
        args:
        - --py3-plus
        - --keep-runtime-typing
-   repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.0.275
    hooks:
    -   id: ruff
        args:
        - --fix
        exclude: ^infra/discord-orchestrator/
# Modern ruff scoped to infra/discord-orchestrator/ only. Keeps the rest of
# the monorepo on the legacy hook above, while this subproject uses current
# ruff rules + format. Version should match the one in
# infra/discord-orchestrator/pyproject.toml's dev extras.
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
    -   id: ruff
        name: ruff (discord-orchestrator)
        files: ^infra/discord-orchestrator/.*\.py$
        args: [--fix]
    -   id: ruff-format
        name: ruff-format (discord-orchestrator)
        files: ^infra/discord-orchestrator/.*\.py$
ci:
    autofix_commit_msg: 🎨 [pre-commit.ci] Auto format from pre-commit.com hooks
    autoupdate_commit_msg: ⬆ [pre-commit.ci] pre-commit autoupdate
