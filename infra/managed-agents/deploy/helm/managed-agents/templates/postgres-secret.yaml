{{- if .Values.postgresql.enabled }}
# PostgreSQL Password Secret
# IMPORTANT: In production, generate this secret separately and do not commit to version control
# Example generation: kubectl create secret generic managed-agents-postgres-secret --from-literal=password=$(openssl rand -base64 32)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "managed-agents.fullname" . }}-postgres-secret
  labels:
    {{- include "managed-agents.labels" . | nindent 4 }}
    component: postgresql
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  # WARNING: This password is stored as base64 in the cluster
  # In production, use external secret management (Sealed Secrets, External Secrets Operator, etc.)
  password: {{ .Values.postgresql.auth.password | b64enc }}

{{- end }}
