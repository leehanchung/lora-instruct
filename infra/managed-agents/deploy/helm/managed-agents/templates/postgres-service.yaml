{{- if .Values.postgresql.enabled }}
# Headless Service for PostgreSQL StatefulSet
# Provides stable DNS records for each pod in the StatefulSet
# Access pattern: {{ include "managed-agents.fullname" . }}-postgresql-0.{{ include "managed-agents.fullname" . }}-postgresql.{{ .Release.Namespace }}.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: {{ include "managed-agents.fullname" . }}-postgresql
  labels:
    {{- include "managed-agents.labels" . | nindent 4 }}
    component: postgresql
  namespace: {{ .Release.Namespace }}
  annotations:
    description: "Headless service for PostgreSQL StatefulSet"
spec:
  # Headless service (clusterIP: None) for StatefulSet DNS records
  clusterIP: None
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "managed-agents.selectorLabels" . | nindent 4 }}
    component: postgresql

{{- end }}
