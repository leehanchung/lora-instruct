{{- if .Values.redis.enabled }}
# ClusterIP Service for Redis
# Provides internal DNS-based service discovery for Redis cache
apiVersion: v1
kind: Service
metadata:
  name: {{ include "managed-agents.fullname" . }}-redis
  labels:
    {{- include "managed-agents.labels" . | nindent 4 }}
    component: redis
  namespace: {{ .Release.Namespace }}
  annotations:
    description: "Service for Redis cache cluster"
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "managed-agents.selectorLabels" . | nindent 4 }}
    component: redis

{{- end }}
