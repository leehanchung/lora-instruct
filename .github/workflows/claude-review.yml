name: PR checks

# Two Claude-powered jobs live in this workflow:
#
#   `review` — fires on every pull_request event. Read-only on repo
#              contents. Produces a formal PR review (approve /
#              request-changes / comment) via `gh pr review`.
#
#   `fix`    — fires when a reviewer comments `@claude` on a PR. Has
#              write access to contents so it can push a fix branch
#              and open a nested PR with proposed changes. Does NOT
#              push directly to the original PR branch — the nested PR
#              is the review surface.
#
# Both use a Pro/Max OAuth token (no Anthropic API key needed) and
# count against subscription rate limits. Per-job concurrency groups
# collapse rapid-fire events within the same job type without letting
# a push cancel an in-progress fix run (or vice versa).
#
# Setup:
#   1. Run `claude setup-token` locally → copy the printed token
#   2. Add as a repo secret named CLAUDE_CODE_OAUTH_TOKEN
#   3. (Optional) run `/install-github-app` inside Claude Code to auto-wire

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  review:
    # Pinned so branch protection can require the check by a stable name
    # (`Claude PR review`) independent of workflow/file renames.
    name: Claude PR review
    # Only fires on pull_request events from human authors. `@claude`
    # mentions on PRs go to the `fix` job below — the two have
    # different permissions and prompts. Bot-authored PRs are skipped
    # because (a) claude-code-action's `allowed_bots` default blocks
    # them and they'd fail at startup anyway, and (b) when the fix job
    # pushes a new commit to a PR branch, that triggers a new
    # pull_request event — without this filter we'd burn subscription
    # quota re-reviewing the same PR after every fix.
    if: >-
      github.event_name == 'pull_request'
      && github.event.pull_request.draft == false
      && github.event.pull_request.user.login != 'claude[bot]'
    runs-on: ubuntu-latest
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      # Required for OIDC token exchange when the Anthropic GitHub App is
      # installed — the action mints a GitHub-signed identity token and
      # trades it for short-lived Anthropic credentials instead of using
      # the raw CLAUDE_CODE_OAUTH_TOKEN secret.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Surface the agent's full stdout/stderr in workflow logs so we
          # can see what the review agent actually did (tool calls, final
          # message) when the reviewer comment doesn't show up on a PR.
          # Flip back to false once review behavior is stable.
          show_full_output: true
          # Whitelist the tools needed to submit a PR review:
          #   - Bash(gh pr review:*): the actual review submission.
          #     Narrow prefix match; no other gh subcommands are allowed.
          #   - Write: lets the agent drop the review body into a
          #     temp file (see prompt) so we can use `gh pr review
          #     --body-file` instead of inline `--body "..."`. The
          #     inline form collides with bash quoting whenever the
          #     review body contains code fences or backticks, and
          #     the agent ends up retrying with progressively
          #     shorter bodies — polluting the review history with
          #     4-5 reviews per run. Using a file sidesteps that
          #     entirely.
          #
          # Reading PR metadata/diff still works via the default-
          # allowed WebFetch tool against the GitHub REST API, so we
          # don't need to whitelist `gh pr view`.
          claude_args: --allowedTools "Write,Bash(gh pr review:*)"
          prompt: |
            You are reviewing a pull request in the SMILE-factory monorepo.

            The active project is the **delulu Discord orchestrator** under
            `apps/delulu_discord` (bot, runs in Docker on a VPS) and
            `apps/delulu_sandbox_modal` (Modal sandbox function that runs
            Claude Code). The root also contains archived LoRA-Instruct
            fine-tuning code — lower priority for review unless the PR
            explicitly touches it.

            Focus your review on, in priority order:
              1. **Correctness** — actual bugs, broken flows, missing
                 error handling at system boundaries (Discord gateway,
                 Modal dispatch, subprocess exec).
              2. **Security** — credential handling, path traversal in the
                 attachment-write path, subprocess argument injection,
                 anything that widens the Modal sandbox's blast radius.
              3. **Boundary invariants** — the bot must never import from
                 `delulu_sandbox_modal` (they're deployed separately); the
                 sandbox must never import bot-side Discord types. Flag any
                 cross-boundary imports.
              4. **Deployment impact** — changes under
                 `apps/delulu_sandbox_modal/` require a Modal redeploy;
                 changes under `apps/delulu_discord/` require a bot
                 container rebuild. Flag if the PR description or commit
                 messages don't mention which side is affected.
              5. **Test coverage gaps** — note missing tests, but don't
                 block on them (the project has minimal test infrastructure
                 today).

            Do **not** comment on:
              - Style nits that ruff would catch (ruff runs in pre-commit)
              - Documentation wording unless it's factually wrong
              - Changes to PRDs under `prd/` — those are planning docs,
                not production code

            Be concise. Do not manufacture feedback to fill space.

            **Submit exactly ONE PR review at the end of the run.
            Never retry on apparent failure — one attempt, one
            outcome.** Duplicate reviews pollute the PR history and
            block merge. The PR number is `${{ github.event.pull_request.number }}`.

            **How to submit** — use the `Write` tool to save your
            review body to `/tmp/review.md`, then call `gh pr review`
            with `--body-file`. Do **not** pass the body inline via
            `--body "..."`: markdown with code fences, backticks,
            and newlines collides with bash quoting, the first
            attempt gets mangled, and any retry pollutes the review
            history.

            Pick exactly one of the three subcommands based on
            severity:

            - No substantive issues →
              `gh pr review <N> --approve         --body-file /tmp/review.md`
            - Issues that must be fixed before merge →
              `gh pr review <N> --request-changes --body-file /tmp/review.md`
            - Observations worth flagging but not blocking →
              `gh pr review <N> --comment         --body-file /tmp/review.md`

            If `gh pr review --approve` fails with a "cannot approve
            your own pull request" error, fall back to `--comment`
            with the same body file (one retry maximum, only for
            this specific error — never retry for any other reason).

  fix:
    # On-demand fix flow: someone comments `@claude <request>` on a PR.
    # Tag mode is auto-detected from the issue_comment + @claude
    # trigger. On an open PR, tag mode pushes new commits **directly**
    # to the PR branch (see its own system prompt: "When triggered on
    # an open PR: Always push directly to the existing PR branch").
    # The fix shows up as a new commit on the same PR rather than as
    # a separate nested PR — still reviewable in the PR's commit list,
    # and this matches tag mode's native design.
    name: Claude PR fix
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request != null
      && contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    concurrency:
      # Separate from the review concurrency group so a fresh push
      # doesn't cancel an in-progress fix run and vice versa.
      group: claude-fix-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      # `write` on contents is what lets the fix job push commits to
      # the PR branch. Tag mode's built-in gatekeeping only runs this
      # for actors with repo write access, so a random PR commenter
      # can't abuse it.
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      # Tag mode's fetcher calls `git hash-object` / `git fetch` to
      # compute file SHAs and bootstrap the working tree, so the
      # runner needs an actual git repo on disk. Without this step the
      # action fails with "fatal: not a git repository" before any
      # edits happen.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # No `claude_args --allowedTools` override here. Tag mode has
          # its own carefully-designed allowlist that wires up the
          # internal MCP file-ops tools and a specific `git-push.sh`
          # wrapper script. Overriding --allowedTools replaces that
          # list wholesale, which strips tag mode of the actual tools
          # it uses to edit files and push — the agent then silently
          # hallucinates "fixed and pushed" without running any edits.
          # Let tag mode use its native defaults.
          #
          # No `prompt:` either — in tag mode the action uses the
          # @claude comment body as the instruction.
