name: PR checks

# Two Claude-powered jobs live in this workflow:
#
#   `review` — fires on every pull_request event. Read-only on repo
#              contents. Produces a formal PR review (approve /
#              request-changes / comment) via `gh pr review`.
#
#   `fix`    — fires when a reviewer comments `@claude` on a PR. Has
#              write access to contents so it can push a fix branch
#              and open a nested PR with proposed changes. Does NOT
#              push directly to the original PR branch — the nested PR
#              is the review surface.
#
# Both use a Pro/Max OAuth token (no Anthropic API key needed) and
# count against subscription rate limits. Per-job concurrency groups
# collapse rapid-fire events within the same job type without letting
# a push cancel an in-progress fix run (or vice versa).
#
# Setup:
#   1. Run `claude setup-token` locally → copy the printed token
#   2. Add as a repo secret named CLAUDE_CODE_OAUTH_TOKEN
#   3. (Optional) run `/install-github-app` inside Claude Code to auto-wire

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  review:
    # Pinned so branch protection can require the check by a stable name
    # (`Claude PR review`) independent of workflow/file renames.
    name: Claude PR review
    # Only fires on pull_request. `@claude` mentions on PRs go to the
    # `fix` job below, not here — the two have different permissions
    # and prompts.
    if: >-
      github.event_name == 'pull_request'
      && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      # Required for OIDC token exchange when the Anthropic GitHub App is
      # installed — the action mints a GitHub-signed identity token and
      # trades it for short-lived Anthropic credentials instead of using
      # the raw CLAUDE_CODE_OAUTH_TOKEN secret.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Surface the agent's full stdout/stderr in workflow logs so we
          # can see what the review agent actually did (tool calls, final
          # message) when the reviewer comment doesn't show up on a PR.
          # Flip back to false once review behavior is stable.
          show_full_output: true
          # Whitelist only `gh pr review` so the agent can submit PR
          # reviews. Claude Code's default bash allowlist blocks
          # everything; without this, every `gh pr review --approve` call
          # comes back as a permission_denial and the bot silently fails
          # to post anything. Reading PR metadata/diff works via the
          # default-allowed WebFetch tool against the GitHub REST API, so
          # we don't need to whitelist `gh pr view`. Prefix-match syntax:
          # Bash(<prefix>:*) matches any command beginning with <prefix>.
          claude_args: --allowedTools "Bash(gh pr review:*)"
          prompt: |
            You are reviewing a pull request in the SMILE-factory monorepo.

            The active project is the **delulu Discord orchestrator** under
            `apps/delulu_discord` (bot, runs in Docker on a VPS) and
            `apps/delulu_sandbox_modal` (Modal sandbox function that runs
            Claude Code). The root also contains archived LoRA-Instruct
            fine-tuning code — lower priority for review unless the PR
            explicitly touches it.

            Focus your review on, in priority order:
              1. **Correctness** — actual bugs, broken flows, missing
                 error handling at system boundaries (Discord gateway,
                 Modal dispatch, subprocess exec).
              2. **Security** — credential handling, path traversal in the
                 attachment-write path, subprocess argument injection,
                 anything that widens the Modal sandbox's blast radius.
              3. **Boundary invariants** — the bot must never import from
                 `delulu_sandbox_modal` (they're deployed separately); the
                 sandbox must never import bot-side Discord types. Flag any
                 cross-boundary imports.
              4. **Deployment impact** — changes under
                 `apps/delulu_sandbox_modal/` require a Modal redeploy;
                 changes under `apps/delulu_discord/` require a bot
                 container rebuild. Flag if the PR description or commit
                 messages don't mention which side is affected.
              5. **Test coverage gaps** — note missing tests, but don't
                 block on them (the project has minimal test infrastructure
                 today).

            Do **not** comment on:
              - Style nits that ruff would catch (ruff runs in pre-commit)
              - Documentation wording unless it's factually wrong
              - Changes to PRDs under `prd/` — those are planning docs,
                not production code

            Be concise. Do not manufacture feedback to fill space.

            **You MUST end every run by submitting exactly one PR review
            via the `gh` CLI — never exit without submitting one.** This
            makes you appear in the Reviewers box with an explicit state
            rather than leaving an ambiguous plain comment. Use the PR
            number from `${{ github.event.pull_request.number }}`.

            - No substantive issues → `gh pr review <N> --approve --body "<short summary>"`
            - Issues that must be fixed before merge → `gh pr review <N> --request-changes --body "<findings>"`
            - Observations worth flagging but not blocking → `gh pr review <N> --comment --body "<findings>"`

            If `gh pr review --approve` fails with a "cannot approve your
            own pull request" error, fall back to `--comment` with the
            same body — that happens when the PR author is the same
            identity the workflow runs as.

  fix:
    # On-demand fix flow: someone comments `@claude <request>` on a PR.
    # The agent makes the requested changes and opens a *nested* PR
    # against the source PR's head branch, so the fix is reviewable as
    # a diff rather than silently rewriting the PR under the author.
    name: Claude PR fix
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request != null
      && contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    concurrency:
      # Separate from the review concurrency group so a fresh push
      # doesn't cancel an in-progress fix run and vice versa.
      group: claude-fix-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      # `write` on contents is what lets the fix branch get pushed.
      # The narrower `pull-requests: write` covers opening the nested
      # PR. Tag mode's built-in gatekeeping only runs this for actors
      # with repo write access, so a random PR commenter can't abuse it.
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          # Broader whitelist than the review job — the fix flow needs
          # to run git (add/commit/push), gh (create the nested PR),
          # and the built-in edit tools (Edit/Write/Read/Glob/Grep).
          # Claude Code's --allowedTools replaces the default allowlist
          # when set, so the built-ins have to be re-listed explicitly.
          # WebFetch is included so the agent can read PR context from
          # the GitHub REST API the same way the review job does.
          claude_args: >-
            --allowedTools "Edit,Write,Read,Glob,Grep,WebFetch,Bash(git:*),Bash(gh:*)"
          # No explicit `prompt:` — in tag mode (auto-detected from the
          # issue_comment + @claude mention), the action uses the
          # comment body as the instruction and its built-in
          # branch-and-PR machinery (see `branch_prefix` /
          # `branch_name_template` in the action inputs) opens the
          # nested PR against the source PR's head branch.
