name: discord-orchestrator deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'Makefile'
      - '.github/workflows/discord-orchestrator-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into droplet, rebuild, and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail
            export PATH="$HOME/.local/bin:$PATH"

            cd /root/SMILE-factory
            OLD_SHA=$(git rev-parse HEAD)
            git pull --ff-only
            NEW_SHA=$(git rev-parse HEAD)
            echo "Deploying $OLD_SHA -> $NEW_SHA"

            # Redeploy the Modal sandbox app only if its source changed
            # (or on a workflow_dispatch / unchanged HEAD, where we can't
            # diff, so err on the side of redeploying).
            if [ "$OLD_SHA" = "$NEW_SHA" ] || \
               git diff --name-only "$OLD_SHA" "$NEW_SHA" -- apps/delulu_sandbox_modal/ | grep -q .; then
              echo "→ redeploying Modal sandbox app"
              make -C apps/delulu_sandbox_modal sync modal-deploy
            else
              echo "→ skipping Modal redeploy (no changes under apps/delulu_sandbox_modal/)"
            fi

            # Rebuild the bot image and restart the container.
            make -C apps/delulu_discord deploy
            docker image prune -f
            echo "Deploy complete"
