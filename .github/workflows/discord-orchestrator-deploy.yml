name: discord-orchestrator deploy

on:
  push:
    branches: [main]
    paths:
      - 'infra/discord-orchestrator/**'
      - '.github/workflows/discord-orchestrator-deploy.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/leehanchung/discord-orchestrator

jobs:
  # Detect whether the Modal sandbox code changed, so we only redeploy
  # the Modal app when it actually needs it.
  changes:
    runs-on: ubuntu-latest
    outputs:
      modal: ${{ steps.filter.outputs.modal }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            modal:
              - 'infra/discord-orchestrator/src/modal_dispatch/**'

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: infra/discord-orchestrator
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-modal:
    needs: changes
    if: needs.changes.outputs.modal == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Deploy Modal sandbox app
        working-directory: infra/discord-orchestrator
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          uv sync
          uv run modal deploy src/modal_dispatch/app.py

  deploy-bot:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into droplet and restart container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail
            docker pull ${{ env.IMAGE }}:latest
            docker stop disco 2>/dev/null || true
            docker rm disco 2>/dev/null || true
            docker run -d \
              --name disco \
              --restart=unless-stopped \
              --env-file /root/disco.env \
              -v /root/.modal.toml:/root/.modal.toml:ro \
              ${{ env.IMAGE }}:latest
            docker image prune -f
