name: discord-orchestrator deploy

on:
  push:
    branches: [main]
    paths:
      - 'infra/discord-orchestrator/**'
      - '.github/workflows/discord-orchestrator-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into droplet, rebuild, and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail
            export PATH="$HOME/.local/bin:$PATH"

            cd /root/lora-instruct
            OLD_SHA=$(git rev-parse HEAD)
            git pull --ff-only
            NEW_SHA=$(git rev-parse HEAD)
            echo "Deploying $OLD_SHA -> $NEW_SHA"

            cd infra/discord-orchestrator

            # Redeploy the Modal sandbox app only if its source changed.
            if [ "$OLD_SHA" = "$NEW_SHA" ] || \
               git diff --name-only "$OLD_SHA" "$NEW_SHA" -- src/modal_dispatch/ | grep -q .; then
              echo "→ redeploying Modal sandbox app"
              uv sync
              uv run modal deploy src/modal_dispatch/app.py
            else
              echo "→ skipping Modal redeploy (no changes under src/modal_dispatch/)"
            fi

            # Rebuild the bot image and restart the container.
            docker build -t discord-orchestrator .
            docker stop disco 2>/dev/null || true
            docker rm disco 2>/dev/null || true
            docker run -d \
              --name disco \
              --restart=unless-stopped \
              --env-file /root/disco.env \
              -v /root/.modal.toml:/root/.modal.toml:ro \
              discord-orchestrator

            docker image prune -f
            echo "Deploy complete"
